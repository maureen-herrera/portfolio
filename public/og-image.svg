<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111111"/>

  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F5F3EE" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left red accent bar -->
  <rect x="80" y="80" width="3" height="80" fill="#E63B2E"/>

  <!-- Monogram -->
  <text x="96" y="108" font-family="'Courier New', monospace" font-size="11" fill="#E63B2E" letter-spacing="6" opacity="0.9">MKH</text>

  <!-- Role badge -->
  <rect x="96" y="126" width="290" height="26" rx="13" fill="#E63B2E" fill-opacity="0.12"/>
  <text x="112" y="143" font-family="'Courier New', monospace" font-size="11" fill="#E63B2E" letter-spacing="3">UNDERWRITING &amp; FINANCIAL OPS</text>

  <!-- Name -->
  <text x="80" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-style="italic" fill="#F5F3EE" letter-spacing="-1">Maureen Kris</text>
  <text x="80" y="395" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-style="italic" fill="#F5F3EE" letter-spacing="-1">E. Herrera</text>

  <!-- Tagline -->
  <text x="82" y="455" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#F5F3EE" opacity="0.4" letter-spacing="0.5">No detail overlooked.</text>

  <!-- Divider -->
  <line x1="80" y1="510" x2="1120" y2="510" stroke="#F5F3EE" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Bottom left: contact -->
  <text x="80" y="548" font-family="'Courier New', monospace" font-size="13" fill="#F5F3EE" opacity="0.3">mau.kherrera@gmail.com</text>

  <!-- Bottom right: location + availability -->
  <text x="820" y="548" font-family="'Courier New', monospace" font-size="13" fill="#E63B2E" opacity="0.7" text-anchor="start">Spring Financial · Philippines · Remote</text>

  <!-- Red dot accent top-right -->
  <circle cx="1100" cy="100" r="60" fill="#E63B2E" opacity="0.06"/>
  <circle cx="1100" cy="100" r="30" fill="#E63B2E" opacity="0.08"/>
</svg>
